name: Deploy to Cloud Run (eeho-engine-kr)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: Build and Push
        run: |
          IMAGE=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/eeho-engine-kr
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy eeho-engine-kr \
            --image asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/eeho-engine-kr \
            --region asia-northeast3 \
            --platform managed \
            --allow-unauthenticated \
            --timeout 1800 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_LOCATION=${{ secrets.GCP_LOCATION }},GEMINI_MODEL=${{ secrets.GEMINI_MODEL }},PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }},PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }},GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }},LAW_API_OC=${{ secrets.LAW_API_OC }},ALERT_EMAIL_FROM=${{ secrets.ALERT_EMAIL_FROM }},GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }},ALERT_EMAIL_TO=${{ secrets.ALERT_EMAIL_TO }}"
